<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coherence Settings</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e2e4ea;
      --text-dim: #8b8fa3;
      --accent: #6c5ce7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    h1 { font-size: 24px; margin-bottom: 4px; }
    .subtitle { color: var(--text-dim); margin-bottom: 32px; font-size: 14px; }
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .section h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 12px; }
    .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; }
    .setting-row label { font-size: 13px; }
    .setting-row input, .setting-row select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
    }
    .btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn:hover { background: var(--border); }
    .btn-danger { color: #e74c3c; border-color: rgba(231,76,60,0.3); }
    input[type="range"] { accent-color: var(--accent); }
  </style>
</head>
<body>
  <h1>◈ Coherence Settings</h1>
  <p class="subtitle">A ruler, not a judge.</p>

  <div class="section">
    <h2>Similarity Detection</h2>
    <div class="setting-row">
      <label for="threshold">Default threshold</label>
      <input type="range" id="threshold" min="60" max="95" value="85">
      <span id="threshold-val">85%</span>
    </div>
    <div class="setting-row">
      <label for="vector-mode">Vector method</label>
      <select id="vector-mode">
        <option value="trigram">Char n-gram (built-in)</option>
        <option value="onnx" disabled>All-MiniLM-L6-v2 (future)</option>
      </select>
    </div>
  </div>

  <div class="section">
    <h2>Notification</h2>
    <div class="setting-row">
      <label for="show-overlay">Show floating button</label>
      <input type="checkbox" id="show-overlay" checked>
    </div>
    <div class="setting-row">
      <label for="min-text-length">Minimum snippet length</label>
      <input type="number" id="min-length" value="3" min="1" max="50"> characters
    </div>
  </div>

  <div class="section">
    <h2>Data</h2>
    <div class="setting-row">
      <label>Total nodes</label>
      <span id="total-nodes">—</span>
    </div>
    <div class="setting-row">
      <label>Storage usage</label>
      <span id="storage-usage">—</span>
    </div>
    <div class="setting-row">
      <button class="btn btn-danger" id="btn-export">Export all data</button>
      <button class="btn btn-danger" id="btn-import">Import data</button>
      <button class="btn btn-danger" id="btn-clear">Clear everything</button>
    </div>
    <input type="file" id="import-file" accept=".json" style="display:none">
  </div>

  <script src="options.js"></script>
</body>
</html>
